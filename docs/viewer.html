<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verilog File Viewer</title>
  <meta name="description" content="Read a single Verilog source file as a dedicated static page on the website." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero small-hero">
    <div class="container">
      <p class="eyebrow">Static file viewer page</p>
      <h1>Verilog Code Viewer</h1>
      <p class="subtitle">
        This page opens a single Verilog file as its own static page, so readers can examine code directly on the website.
      </p>
      <div class="actions">
        <a class="btn primary" href="browse.html">Back to Browse</a>
        <a class="btn secondary" href="index.html">Back to Home</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section viewer-shell">
      <div class="viewer-header">
        <div>
          <p class="section-tag">Single-file viewer</p>
          <h2 id="pageTitle">Reading Verilog code</h2>
        </div>
        <a class="btn secondary small" id="github-link" target="_blank" rel="noreferrer">Open source on GitHub</a>
      </div>

      <div class="viewer-panel">
        <div class="meta-row">
          <span id="currentFileLabel">Loading file…</span>
        </div>
        <pre id="codeOutput">Loading code preview…</pre>
      </div>
    </section>
  </main>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
